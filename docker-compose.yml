services:
  postgres:
    image: postgres:16-alpine
    container_name: point-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: point
      POSTGRES_PASSWORD: point
      POSTGRES_DB: point
    ports:
      - "5432:5432"
    volumes:
      - point_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U point -d point"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: point-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - point_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  point_pg_data:
  point_redis_data:
